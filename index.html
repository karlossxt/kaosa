<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Noticias Kaos Akustico</title>
    <style>
        body { font-family: sans-serif; padding: 20px; }
        .post { border-bottom: 1px solid #ccc; padding: 15px 0; }
        h2 { margin: 0; }
    </style>
</head>
<body>
    <h1>Noticias Actualizadas</h1>
    <div id="lista">Cargando...</div>

    <script>
        // Usamos un proxy para saltar el bloqueo de HostGator
        const api = "https://kaosakustico.com";
        const proxy = "https://api.allorigins.win" + encodeURIComponent(api);

        async function traerNoticias() {
            try {
                const res = await fetch(proxy);
                const data = await res.json();
                const posts = JSON.parse(data.contents); // El proxy envuelve los datos aquí
                
                let html = "";
                posts.forEach(p => {
                    html += `<div class="post">
                                <h2>${p.title.rendered}</h2>
                                <p>${p.excerpt.rendered}</p>
                                <a href="${p.link}" target="_blank">Leer más</a>
                             </div>`;
                });
                document.getElementById('lista').innerHTML = html;
            } catch (e) {
                document.getElementById('lista').innerHTML = "Error crítico de conexión con el servidor.";
            }
        }
        traerNoticias();
    </script>
</body>
</html>
